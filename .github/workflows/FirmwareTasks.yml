name: FirmwareTasks

on:
  pull_request:
    paths:
      - "firmware/**"

jobs:
  ceedling-tests:
    name: Ceedling Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Ceedling tests in MadScienceLab
        shell: bash
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${GITHUB_WORKSPACE}:/home/dev/project" \
            -w /home/dev/project/firmware/test \
            throwtheswitch/madsciencelab:latest \
            ceedling gcov:all

  clang-format-check:
    name: Clang Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify formatting
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: >
            firmware/test/test
            firmware/Gruffalo_Dimmer/src
            firmware/Gruffalo_Dimmer/inc
            firmware/Gruffalo_Dimmer/app.h
            firmware/Gruffalo_Dimmer/app.c
            firmware/Gruffalo_Dimmer/main.c
          extensions: c,h
          style: file
          clangFormatVersion: 20

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cppcheck toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck gcc-arm-none-eabi ninja-build

      - name: Generate compile commands
        working-directory: firmware/Gruffalo_Dimmer/cmake_gcc
        env:
          ARM_GCC_DIR: /usr
          NINJA_EXE_PATH: /usr/bin/ninja
        run: |
          cmake --preset project -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run cppcheck
        working-directory: firmware/Gruffalo_Dimmer
        run: |
          cppcheck \
            --enable=warning,performance,portability,style \
            --inline-suppr \
            --suppressions-list=.cppcheck_ignore \
            --project=project.cppcheck \
            --std=c17 \
            --error-exitcode=1
