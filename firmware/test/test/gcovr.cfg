# --- Search Paths ---
# Point to your source code (usually '.' or 'src/')
filter = ../Gruffalo_Dimmer/src

# --- Exclusion Rules ---
# Exclude third-party libraries or test folders
exclude = test/
exclude = build/

# --- Branch Coverage Logic ---
# If you use assert() for unreachable code, this tells gcovr
# to ignore those branches in the percentage calculation.
exclude-branches-by-pattern = app_assert
exclude-unreachable-branches = yes

# --- Output Formats ---
# Generate both a pretty HTML report and a summary in the terminal
html = coverage_report.html
html-details = yes
print-summary = yes

# --- Quality Gates ---
# Fail the build if coverage drops below these percentages
fail-under-line = 90
fail-under-branch = 80